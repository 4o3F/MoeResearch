# Copy this file to lapis.toml and adjust values for your environment.
# Do not put API keys in this file; set the referenced environment variables instead.

[logging]
# Supported CLI log formats: compact, pretty, json.
format = "json"

[network]
timeout_ms = 30000
max_retries = 2
retry_backoff_ms = 200
user_agent = "lapis/0.1.0"

[network.limits]
max_timeout_ms = 120000
max_retries = 5
max_retry_backoff_ms = 5000

[search]
preferred_providers = ["exa", "grok"]

[search.providers.exa]
enabled = false
base_url = "https://api.exa.ai"
api_key_env = "EXA_API_KEY"
timeout_ms = 30000

[search.providers.grok]
enabled = false
base_url = "https://api.x.ai"
api_key_env = "XAI_API_KEY"
timeout_ms = 30000

[model]
default_provider = "openai-compatible"

[model.providers.openai-compatible]
enabled = false
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
timeout_ms = 30000

[budget]
# Set a budget value to -1 to make that limit unlimited.
max_agents = -1
max_concurrent_agents = -1
max_search_calls_per_agent = -1
max_tool_calls_per_agent = -1
max_turns_per_agent = -1
max_total_model_calls = -1
max_total_search_calls = -1
max_agent_timeout_ms = -1
max_total_timeout_ms = -1
