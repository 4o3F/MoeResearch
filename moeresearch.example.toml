# Copy this file to moeresearch.toml and adjust values for your environment.
# Do not put API keys in this file; set the referenced environment variables instead.

[logging]
# Supported CLI log formats: compact, pretty, json.
format = "json"

[network]
# Outbound network inactivity timeout. SSE streams may run longer when events keep arriving.
inactivity_timeout_ms = 120000
max_retries = 2
retry_backoff_ms = 200
user_agent = "moeresearch/0.1.0"
# Optional proxy for all outbound HTTP requests.
# HTTP/HTTPS: proxy_url = "http://proxy.example.com:8080"
# SOCKS5 (local DNS): proxy_url = "socks5://127.0.0.1:1080"
# SOCKS5h (proxy DNS): proxy_url = "socks5h://127.0.0.1:1080"

[search.providers.exa]
enabled = false
base_url = "https://api.exa.ai"
api_key_env = "EXA_API_KEY"
inactivity_timeout_ms = 120000

[search.providers.tavily]
enabled = false
base_url = "https://api.tavily.com"
api_key_env = "TAVILY_API_KEY"
inactivity_timeout_ms = 120000

[search.providers.grok]
enabled = false
base_url = "https://api.x.ai/v1"
api_key_env = "XAI_API_KEY"
inactivity_timeout_ms = 120000
model = "grok-4.3"
# Optional Grok-only knob:
#   max_output_tokens = 1024      # cap response size; omit to let provider default apply
#   reasoning_effort = "high"     # one of: none, low, medium, high; omit to let provider default apply

[model.providers.openai]
enabled = false
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
inactivity_timeout_ms = 120000
model = "gpt-5.5"

# Set any limit value to -1 to make that limit unlimited.
[limits.research]
max_agents = -1
max_concurrent_agents = -1
max_total_model_calls = -1
max_total_search_calls = -1
total_timeout_ms = -1
max_tokens = -1

[limits.per_agent]
max_turns = -1
max_tool_calls = -1
max_search_calls = -1
timeout_ms = -1
